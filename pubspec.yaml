name: wifi_proximity_detector
description: A mobile app to monitor WiFi signal strength and display proximity-based feedback
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  material_design_icons_flutter: ^7.0.7296
  
  # WiFi & Network
  network_info_plus: ^5.0.0
  
  # State Management
  provider: ^6.1.2
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Local Storage
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
