<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1976D2" opacity="0.1"/>
  
  <!-- WiFi signal waves -->
  <g transform="translate(100, 110)">
    <!-- Outer wave (weakest signal) -->
    <path d="M -60 -20 Q -60 -60, 0 -70 Q 60 -60, 60 -20" 
          fill="none" 
          stroke="#1976D2" 
          stroke-width="6" 
          stroke-linecap="round"
          opacity="0.4"/>
    
    <!-- Middle wave -->
    <path d="M -40 -15 Q -40 -45, 0 -52 Q 40 -45, 40 -15" 
          fill="none" 
          stroke="#1976D2" 
          stroke-width="7" 
          stroke-linecap="round"
          opacity="0.6"/>
    
    <!-- Inner wave (strongest signal) -->
    <path d="M -20 -10 Q -20 -25, 0 -30 Q 20 -25, 20 -10" 
          fill="none" 
          stroke="#1976D2" 
          stroke-width="8" 
          stroke-linecap="round"
          opacity="0.8"/>
    
    <!-- Center dot (router/source) -->
    <circle cx="0" cy="0" r="10" fill="#1976D2"/>
    
    <!-- Highlight on center dot -->
    <circle cx="-2" cy="-2" r="4" fill="#FFFFFF" opacity="0.6"/>
  </g>
  
  <!-- App name text (optional, can be removed if only icon is needed) -->
  <text x="100" y="180" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#1976D2">WiFi Detector</text>
</svg>
